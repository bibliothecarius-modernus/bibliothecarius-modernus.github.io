---
layout: default
permalink: /404.html
---

<div class="error-page">
  <h1>404</h1>
  <h2>Page Not Found</h2>
  
  <div class="error-content">
    <p>The page you're looking for doesn't exist or has been moved!</p>
    <p>Perhaps you were searching for a document that hasn't been translated yet?</p>
    
    <div class="error-actions">
      <a href="{{ site.baseurl }}/" class="return-button">Return to Home</a>
    </div>
  </div>
  
  <div class="search-container">
    <h3>Search Our Archives</h3>
    <div class="search-form">
      <form action="{{ '/search.html' | relative_url }}" method="get">
        <input type="text" name="query" placeholder="Search translations..." class="search-input">
        <button type="submit" class="search-button">Search</button>
      </form>
    </div>
  </div>
</div>

<style>
  .error-page {
    text-align: center;
    padding: 50px 0;
    max-width: 800px;
    margin: 0 auto;
  }
  
  .error-page h1 {
    font-size: 8rem;
    margin: 0;
    color: var(--highlight-color);
    line-height: 1;
  }
  
  .error-page h2 {
    font-size: 2rem;
    margin-top: 0;
    margin-bottom: 30px;
  }
  
  .error-content {
    margin-bottom: 40px;
  }
  
  .error-content p {
    font-size: 1.2rem;
    margin-bottom: 15px;
  }
  
  .error-actions {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
    flex-wrap: wrap;
  }
  
  .return-button {
    display: inline-block;
    background-color: var(--highlight-color);
    color: white;
    padding: 12px 25px;
    border-radius: 4px;
    font-weight: bold;
    transition: background-color 0.3s ease, transform 0.3s ease;
  }
  
  .return-button:hover {
    background-color: var(--dark-highlight);
    color: white;
    transform: translateY(-3px);
  }
  
  .search-container {
    margin-top: 50px;
    padding-top: 30px;
    border-top: 1px solid var(--medium-gray);
  }
  
  .search-container h3 {
    margin-bottom: 20px;
  }
  
  .search-form {
    display: flex;
    justify-content: center;
  }
  
  .search-input {
    width: 100%;
    max-width: 400px;
    padding: 12px 15px;
    border: 2px solid var(--medium-gray);
    border-radius: 4px 0 0 4px;
    font-size: 1rem;
    transition: border-color 0.3s ease;
  }
  
  .search-input:focus {
    outline: none;
    border-color: var(--highlight-color);
  }
  
  .search-button {
    background-color: var(--highlight-color);
    color: white;
    border: none;
    padding: 12px 20px;
    font-size: 1rem;
    font-weight: bold;
    border-radius: 0 4px 4px 0;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }
  
  .search-button:hover {
    background-color: var(--dark-highlight);
  }
  
  @media screen and (max-width: 600px) {
    .error-page h1 {
      font-size: 6rem;
    }
    
    .error-page h2 {
      font-size: 1.7rem;
    }
    
    .error-content p {
      font-size: 1.1rem;
    }
    
    .error-actions {
      flex-direction: column;
      gap: 15px;
    }
    
    .search-form {
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    
    .search-input {
      border-radius: 4px;
    }
    
    .search-button {
      border-radius: 4px;
      width: 100%;
      max-width: 400px;
    }
  }
</style>
